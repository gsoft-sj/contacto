<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmarTire Control</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at top, #111827, #020617);
    color: white;
  }

  .wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: rgba(17, 24, 39, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 22px 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
  }

  .logo {
    width: 140px;
    margin: 0 auto 14px;
    display: block;
  }

  h1 {
    font-size: 20px;
    line-height: 1.3;
    text-align: center;
    margin-bottom: 6px;
  }

  .highlight {
    color: #38bdf8;
  }

  p {
    text-align: center;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 18px;
  }

  .input-group {
    margin-bottom: 12px;
  }

  input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #020617;
    color: white;
    font-size: 14px;
  }

  input:focus {
    outline: none;
    border-color: #38bdf8;
    box-shadow: 0 0 0 2px rgba(56,189,248,0.2);
  }

  button {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: white;
    font-size: 15px;
    font-weight: 600;
    margin-top: 6px;
  }

  button:active {
    transform: scale(0.97);
  }

  .badge {
    margin-top: 12px;
    text-align: center;
    font-size: 11px;
    color: #64748b;
  }

  /* 📱 ajustes extra mobile */
  @media (max-height: 700px) {
    .wrapper {
      align-items: flex-start;
      padding-top: 20px;
    }
  }

</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <!-- LOGO -->
    <img src="logo.png" alt="SmarTire Control" class="logo">

    <!-- TITULO -->
    <h1>
      ¿Estás perdiendo dinero en <span class="highlight">neumáticos</span>?
    </h1>

    <p>
      Dejá tus datos y coordinamos después de la feria para optimizar tu operación.
    </p>

    <!-- FORM -->
    <div class="input-group">
      <input type="text" id="nombre" placeholder="Nombre" autocomplete="name">
    </div>

    <div class="input-group">
      <input type="text" id="empresa" placeholder="Empresa" autocomplete="organization">
    </div>

    <div class="input-group">
      <input type="text" id="cargo" placeholder="Cargo">
    </div>

    <button onclick="enviar()">Coordinar después de la feria</button>

    <div class="badge">⏱ 30 segundos</div>

  </div>
</div>

<script>
function enviar() {
  const nombre = document.getElementById("nombre").value.trim();
  const empresa = document.getElementById("empresa").value.trim();
  const cargo = document.getElementById("cargo").value.trim();

  if (!nombre || !empresa || !cargo) {
    alert("Completá todos los campos");
    return;
  }

  const mensaje = `Hola, soy ${nombre} de ${empresa}, cargo: ${cargo}. Coordinamos después de la feria.`;

  const url = `https://wa.me/5492644398623?text=${encodeURIComponent(mensaje)}`;

  window.location.href = url;
}
</script>

</body>
</html>
